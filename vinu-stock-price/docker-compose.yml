services:
  live-ingest:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["vinu-stock-ingest", "--interval", "60"]
    env_file: .env
    environment:
      VINU_STOCK_DATA_ROOT: /data
      VINU_STOCK_META_DB_PATH: /data/meta.db
      # Optional: share watchlist with vinu-news (mount same file path)
      # VINU_SHARED_WATCHLIST_PATH: /data/shared/watchlist.json
    volumes:
      - vinu_stock_data:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["vinu-stock-serve", "--host", "0.0.0.0", "--port", "8081"]
    env_file: .env
    environment:
      VINU_STOCK_DATA_ROOT: /data
      VINU_STOCK_META_DB_PATH: /data/meta.db
      # Optional: share watchlist with vinu-news (mount same file path)
      # VINU_SHARED_WATCHLIST_PATH: /data/shared/watchlist.json
    ports:
      - "8081:8081"
    volumes:
      - vinu_stock_data:/data
    restart: unless-stopped
    depends_on:
      - live-ingest

volumes:
  vinu_stock_data:
